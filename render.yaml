databases:
  - name: sfx-db
    plan: starter
    databaseName: sfx_repository
    user: sfx_user
    region: oregon

services:
  - type: web
    name: sfx-repo
    runtime: python
    region: oregon
    plan: starter
    buildCommand: |
      cd frontend && npm install --cache /tmp/npm-cache --legacy-peer-deps && npm run build && cp -r dist ../backend/static && cd ../backend && pip install -r requirements.txt && PYTHONPATH=. alembic upgrade head
    startCommand: |
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sfx-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SESSION_SECRET_KEY
        generateValue: true
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
    healthCheckPath: /health
